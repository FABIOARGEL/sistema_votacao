{% extends "base.html" %}
{% block title %}Cadastro — VotoDistribuído{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <h1 class="auth-title">Criar conta</h1>
    <p class="auth-subtitle">Crie votações e participe de processos distribuídos</p>

    <a href="{{ url_for('auth.google_login') }}" class="btn btn-google btn-full" id="btn-google-register">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Cadastrar com Google
    </a>

    <div class="auth-divider">ou crie com e-mail</div>

    <form method="POST" action="{{ url_for('auth.register') }}" id="register-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <div style="position:relative;">
          <input type="password" id="senha" name="senha" placeholder="Mín. 6 caracteres" required minlength="6">
          <button type="button" onclick="toggleSenha('senha','olho1')"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);" id="olho1">👁️</button>
        </div>
        <!-- Indicador de força -->
        <div id="senha-strength" style="margin-top:0.4rem; height:4px; border-radius:2px; background:var(--border); overflow:hidden;">
          <div id="strength-bar" style="height:100%; width:0; transition:all 0.3s; background:var(--red);"></div>
        </div>
        <span id="strength-text" style="font-size:0.7rem; color:var(--text-muted);"></span>
      </div>
      <div class="form-group">
        <label for="confirmar_senha">Confirmar senha</label>
        <div style="position:relative;">
          <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required minlength="6">
          <button type="button" onclick="toggleSenha('confirmar_senha','olho2')"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);" id="olho2">👁️</button>
        </div>
        <span id="conf-match" style="font-size:0.75rem;"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-register">
        Criar conta
      </button>
    </form>

    <p class="text-center mt-2" style="font-size:0.875rem; color:var(--text-secondary);">
      Já tem conta?
      <a href="{{ url_for('auth.login') }}" style="color:var(--blue); text-decoration:none; font-weight:600;">Fazer login</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleSenha(inputId, btnId) {
  const inp = document.getElementById(inputId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  document.getElementById(btnId).textContent = inp.type === 'password' ? '👁️' : '🔒';
}

// Força da senha
document.getElementById('senha').addEventListener('input', function() {
  const v = this.value, bar = document.getElementById('strength-bar'), txt = document.getElementById('strength-text');
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const labels = ['', 'Muito fraca', 'Fraca', 'Média', 'Forte', 'Muito forte'];
  const colors = ['', 'var(--red)', 'var(--yellow)', 'var(--yellow)', 'var(--green)', 'var(--green)'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score] || 'var(--border)';
  txt.textContent = labels[score] || '';
  txt.style.color = colors[score] || '';
});

// Confirmação
document.getElementById('confirmar_senha').addEventListener('input', function() {
  const match = document.getElementById('conf-match');
  if (this.value === document.getElementById('senha').value) {
    match.textContent = '✅ Senhas coincidem'; match.style.color = 'var(--green)';
  } else {
    match.textContent = '❌ Senhas diferentes'; match.style.color = 'var(--red)';
  }
});
</script>
{% endblock %}
