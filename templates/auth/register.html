{% extends "base.html" %}
{% block title %}Criar Conta — VotoDistribuído{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <h1 class="auth-title">Criar nova conta</h1>
    <p class="auth-subtitle">Preencha os campos abaixo para começar</p>

      <form method="POST" action="{{ url_for('auth.register') }}" id="register-form">
        <div class="form-group">
          <label for="nome" class="auth-field-label">Nome Completo</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Ana Silva" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email" class="auth-field-label">Endereço de E-mail</label>
          <input type="email" id="email" name="email" placeholder="nome@provedor.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="senha" class="auth-field-label">Senha</label>
          <div style="position: relative;">
            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6" style="padding-right: 44px;">
            <button type="button" onclick="toggleSenha('senha','eye-icon-1')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 4px;" aria-label="Mostrar/ocultar senha">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon-1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <!-- Strength indicator -->
          <div id="senha-strength" style="margin-top: 8px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden;">
            <div id="strength-bar" style="height: 100%; width: 0; transition: all 0.3s; background: var(--red);"></div>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
            <span style="font-size: 11px; color: var(--text-muted);">Força da senha</span>
            <span id="strength-text" style="font-size: 11px; font-weight: 600;"></span>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label for="confirmar_senha" class="auth-field-label">Confirmar Senha</label>
          <div style="position: relative;">
            <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required minlength="6" style="padding-right: 44px;">
            <button type="button" onclick="toggleSenha('confirmar_senha','eye-icon-2')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 4px;" aria-label="Mostrar/ocultar senha">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon-2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span id="conf-match" style="font-size: 12px; display: block; margin-top: 4px; font-weight: 500;"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-register" style="height: 44px; font-weight: 600; font-size: 15px;">
          Criar minha conta
        </button>
      </form>

    <p class="auth-footer-link">
      Já tem uma conta?
      <a href="{{ url_for('auth.login') }}">Entrar agora</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleSenha(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const isPrivate = inp.type === 'password';
  inp.type = isPrivate ? 'text' : 'password';
  const icon = document.getElementById(iconId);
  if (isPrivate) {
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Password strength
document.getElementById('senha').addEventListener('input', function() {
  const v = this.value;
  const bar = document.getElementById('strength-bar');
  const txt = document.getElementById('strength-text');
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;

  const labels = ['', 'Muito Fraca', 'Fraca', 'Moderada', 'Forte', 'Excelente'];
  const colors = ['', 'var(--red)', 'var(--red)', 'var(--yellow)', 'var(--green)', 'var(--green)'];

  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score] || 'var(--border)';
  txt.textContent = labels[score] || '';
  txt.style.color = colors[score] || '';
});

// Confirmation check
document.getElementById('confirmar_senha').addEventListener('input', function() {
  const match = document.getElementById('conf-match');
  const primaryVal = document.getElementById('senha').value;
  if (!this.value) {
    match.textContent = '';
  } else if (this.value === primaryVal) {
    match.textContent = '✓ As senhas coincidem';
    match.style.color = 'var(--green)';
  } else {
    match.textContent = '✗ As senhas não coincidem';
    match.style.color = 'var(--red)';
  }
});
</script>
{% endblock %}
