{% extends "base.html" %}
{% block title %}Definir Nova Senha — VotoDistribuído{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <h1 class="auth-title">Nova Credencial</h1>
    <p class="auth-subtitle">Defina uma nova assinatura eletrônica de acesso</p>
    
    <form method="POST">
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="senha" style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 600;">Nova Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6" style="width: 100%; padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.875rem; transition: var(--transition);" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" id="btn-reset-senha" style="padding: 0.75rem; font-weight: 600; font-size: 0.875rem; margin-bottom: 1rem;">
        Salvar Nova Senha
      </button>
    </form>
    
    <p class="text-center" style="font-size: 0.875rem; text-align: center; margin-top: 1.25rem;">
      <a href="{{ url_for('auth.login') }}" style="color: var(--blue); font-weight: 500; display: inline-flex; align-items: center; gap: 0.375rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Voltar para o Login
      </a>
    </p>
  </div>
</div>
{% endblock %}
