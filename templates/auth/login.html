{% extends "base.html" %}
{% block title %}Entrar — VotoDistribuído{% endblock %}

{% block content %}
<div class="auth-page">


  <div class="auth-card fade-in">
    <h1 class="auth-title">Acessar conta</h1>
    <p class="auth-subtitle">Entre com suas credenciais para continuar</p>

      <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
        <div class="form-group">
          <label for="email" class="auth-field-label">E-mail</label>
          <input type="email" id="email" name="email" placeholder="nome@provedor.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="senha" class="auth-field-label">Senha</label>
          <div style="position: relative;">
            <input type="password" id="senha" name="senha" placeholder="Sua senha de acesso" required autocomplete="current-password" style="padding-right: 44px;">
            <button type="button" onclick="toggleSenha('senha','eye-icon')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 4px;" id="olho-senha" aria-label="Mostrar/ocultar senha">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="flex-between" style="margin-bottom: 20px;">
          <label class="form-check">
            <input type="checkbox" name="lembrar" id="lembrar">
            <span style="font-size: 13px; color: var(--text-secondary);">Manter conectado</span>
          </label>
          <a href="{{ url_for('auth.reset_request') }}" style="font-size: 13px; color: var(--blue); font-weight: 500;">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login" style="height: 44px; font-weight: 600; font-size: 15px;">
          Entrar na conta
        </button>
      </form>

    <p class="auth-footer-link">
      Não tem uma conta?
      <a href="{{ url_for('auth.register') }}">Criar conta grátis</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleSenha(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const isPrivate = inp.type === 'password';
  inp.type = isPrivate ? 'text' : 'password';
  const icon = document.getElementById(iconId);
  if (isPrivate) {
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
{% endblock %}
