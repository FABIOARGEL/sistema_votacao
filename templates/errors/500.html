{% extends "base.html" %}
{% block title %}Erro de Rede — VotoDistribuído{% endblock %}

{% block content %}
<div class="page" style="display: flex; align-items: center; justify-content: center; padding: 4rem 1rem;">
  <div class="container-sm" style="max-width: 480px; text-align: center;">
    
    <div style="width: 80px; height: 80px; border-radius: var(--radius-md); background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: var(--red); box-shadow: 0 0 16px rgba(239, 68, 68, 0.15);">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    
    <h1 style="font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem; background: linear-gradient(135deg, #FFF 0%, var(--border) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">500</h1>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-primary);">Erro Interno do Servidor</h2>
    <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin-bottom: 2rem;">
      Ocorreu uma instabilidade na comunicação entre processos da rede distribuída. Por favor, reinicie a operação.
    </p>
    
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 0.75rem 1.75rem; font-weight: 600; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.375rem; box-shadow: 0 0 20px rgba(79, 140, 255, 0.2);">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Voltar para o Início
    </a>
  </div>
</div>
{% endblock %}
