{% extends "base.html" %}
{% block title %}Acesso Restrito — VotoDistribuído{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    
    <!-- Lock shield icon -->
    <div style="width: 54px; height: 54px; border-radius: var(--radius-md); background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; color: var(--red); box-shadow: 0 0 16px rgba(239, 68, 68, 0.15);">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h1 class="auth-title" style="font-size: 1.35rem; font-weight: 700; margin-bottom: 0.25rem; color: var(--text-primary);">Sessão Restrita</h1>
    <p class="auth-subtitle" style="margin-bottom: 0.75rem; font-weight: 600; color: var(--blue);">{{ votacao.titulo }}</p>
    <p class="text-muted text-sm text-center mb-3" style="color: var(--text-secondary); line-height: 1.4; margin-bottom: 1.5rem;">Esta sessão eleitoral foi configurada de forma privada. Digite o código de acesso para participar.</p>
    
    <form method="POST">
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="senha" style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 600;">Código de Acesso da Sessão</label>
        <input type="password" id="senha" name="senha" placeholder="Digite a senha de acesso" required autofocus style="width: 100%; padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.875rem; transition: var(--transition);" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'">
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" id="btn-acessar" style="padding: 0.75rem; font-weight: 600; font-size: 0.875rem;">
        Autenticar Acesso
      </button>
    </form>
    
    <p class="text-center" style="font-size: 0.875rem; text-align: center; margin-top: 1.5rem;">
      <a href="{{ url_for('votacoes.lista') }}" style="color: var(--text-muted); font-weight: 500; display: inline-flex; align-items: center; gap: 0.375rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Voltar para Votações
      </a>
    </p>
  </div>
</div>
{% endblock %}
